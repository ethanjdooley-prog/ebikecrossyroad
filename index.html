<!DOCTYPE html>
<html>
<head>
<title>E-Bike Crossy Road</title>
<style>
body{
margin:0;
background:#87CEEB;
font-family:Arial;
text-align:center;
}

canvas{
background:#7ec850;
display:block;
margin:auto;
border:3px solid black;
}
</style>
</head>

<body>

<h2>E-Bike Crossy Road 🚴</h2>
<canvas id="game" width="500" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const laneHeight = 60;

let player;
let lanes=[];
let cars=[];
let trains=[];

let score=0;
let gameOver=false;

let spawnLane = 0;

let highScore = localStorage.getItem("ebikeHighScore") || 0;

function resetGame(){

player = {
x:240,
lane:spawnLane,
width:34,
height:34
};

lanes=[];
cars=[];
trains=[];

score=0;
gameOver=false;

for(let i=-4;i<15;i++){
generateLane(i);
}

}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generateLane(index){

let type;

if(index <= spawnLane+1){
type="grass";
}
else{

let types=["road","rail","grass"];
type=rand(types);

}

lanes.push({index,type});

if(type==="road"){

let count = 2 + Math.floor(score/6);

for(let i=0;i<count;i++){

cars.push({
x:Math.random()*500,
lane:index,
width:50,
height:30,
speed:2+Math.random()*2,
dir:Math.random()<0.5?1:-1
});

}

}

if(type==="rail"){

if(Math.random()<0.6){

trains.push({
x:-600,
lane:index,
width:600,
height:40,
speed:7
});

}

}

}

document.addEventListener("keydown",e=>{

if(e.key==="r"||e.key==="R"){
resetGame();
return;
}

if(gameOver) return;

if(e.key==="ArrowUp"||e.key==="w"){

player.lane++;
score++;

if(score>highScore){
highScore=score;
localStorage.setItem("ebikeHighScore",highScore);
}

generateLane(player.lane+12);

}

if(e.key==="ArrowDown"||e.key==="s"){
player.lane--;
}

if(e.key==="ArrowLeft"||e.key==="a") player.x-=40;
if(e.key==="ArrowRight"||e.key==="d") player.x+=40;

});

function laneY(index){
return canvas.height/2 - ((index-player.lane)*laneHeight);
}

function drawBike(){

let x=player.x;
let y=canvas.height/2;

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(x-10,y+20,10,0,Math.PI*2);
ctx.arc(x+30,y+20,10,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="black";
ctx.lineWidth=3;

ctx.beginPath();
ctx.moveTo(x-10,y+20);
ctx.lineTo(x+10,y);
ctx.lineTo(x+30,y+20);
ctx.stroke();

ctx.fillStyle="blue";
ctx.fillRect(x+5,y-8,12,16);

ctx.fillStyle="#f2c29e";
ctx.beginPath();
ctx.arc(x+11,y-16,6,0,Math.PI*2);
ctx.fill();

}

function drawWorld(){

lanes.forEach(l=>{

let y=laneY(l.index);

if(y>600||y<-60) return;

if(l.type==="road"){

ctx.fillStyle="#444";
ctx.fillRect(0,y,500,laneHeight);

ctx.strokeStyle="white";
ctx.lineWidth=2;

for(let i=0;i<10;i++){

ctx.beginPath();
ctx.moveTo(i*60,y+laneHeight/2);
ctx.lineTo(i*60+30,y+laneHeight/2);
ctx.stroke();

}

}

if(l.type==="grass"){

ctx.fillStyle="#7ec850";
ctx.fillRect(0,y,500,laneHeight);

}

if(l.type==="rail"){

ctx.fillStyle="#8b6f47";
ctx.fillRect(0,y,500,laneHeight);

ctx.strokeStyle="black";

ctx.beginPath();
ctx.moveTo(0,y+20);
ctx.lineTo(500,y+20);
ctx.moveTo(0,y+40);
ctx.lineTo(500,y+40);
ctx.stroke();

}

});

}

function drawCars(){

cars.forEach(c=>{

let y=laneY(c.lane);
if(y>600||y<-60) return;

ctx.fillStyle="red";
ctx.fillRect(c.x,y+15,c.width,c.height);

});

}

function updateCars(){

cars.forEach(c=>{

c.x+=c.speed*c.dir;

if(c.dir===1 && c.x>500) c.x=-c.width;
if(c.dir===-1 && c.x<-c.width) c.x=500;

let y=laneY(c.lane);

let playerBox={
x:player.x,
y:canvas.height/2,
w:player.width,
h:player.height
};

let carBox={
x:c.x,
y:y+15,
w:c.width,
h:c.height
};

if(
playerBox.x < carBox.x + carBox.w &&
playerBox.x + playerBox.w > carBox.x &&
playerBox.y < carBox.y + carBox.h &&
playerBox.y + playerBox.h > carBox.y
){
gameOver=true;
}

});

}

function drawTrains(){

trains.forEach(t=>{

let y=laneY(t.lane);

ctx.fillStyle="black";
ctx.fillRect(t.x,y+10,t.width,t.height);

});

}

function updateTrains(){

trains.forEach(t=>{

t.x+=t.speed;

let y=laneY(t.lane);

let playerBox={
x:player.x,
y:canvas.height/2,
w:player.width,
h:player.height
};

let trainBox={
x:t.x,
y:y+10,
w:t.width,
h:t.height
};

if(
playerBox.x < trainBox.x + trainBox.w &&
playerBox.x + playerBox.w > trainBox.x &&
playerBox.y < trainBox.y + trainBox.h &&
playerBox.y + playerBox.h > trainBox.y
){
gameOver=true;
}

});

}

function drawScore(){

ctx.fillStyle="black";
ctx.font="18px Arial";
ctx.fillText("Score: "+score,10,20);
ctx.fillText("High Score: "+highScore,10,40);

}

function drawGameOver(){

ctx.fillStyle="black";
ctx.font="40px Arial";
ctx.fillText("CRASH!",180,260);

ctx.font="20px Arial";
ctx.fillText("Press R to Respawn",160,300);

}

function gameLoop(){

ctx.clearRect(0,0,500,600);

drawWorld();

updateCars();
drawCars();

updateTrains();
drawTrains();

drawBike();
drawScore();

if(gameOver){
drawGameOver();
}

requestAnimationFrame(gameLoop);

}

resetGame();
gameLoop();

</script>

</body>
</html>
